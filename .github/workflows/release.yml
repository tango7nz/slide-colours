name: Build and release

# Runs when you push a version tag, e.g.  git tag v1.1.0 && git push origin v1.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required for the workflow to create a Release

jobs:
  build:
    runs-on: windows-latest   # WPF (net8.0-windows) must build on Windows

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained single-file exe
        shell: pwsh
        run: |
          # Stamp the assembly with the tag's version (v1.2.3 -> 1.2.3) so the built exe reports
          # the same version the self-updater compares against.
          $ver = $env:GITHUB_REF_NAME -replace '^v', ''
          dotnet publish SlideColours/SlideColours.csproj `
            -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=none `
            /p:Version=$ver `
            -o dist-standalone

      - name: Create GitHub Release and upload the exe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # The asset keeps a stable, version-less name so the self-updater can replace the running
          # file in place without its name going stale. The version lives in the tag/release.
          gh release create $env:GITHUB_REF_NAME `
            "dist-standalone/SlideColours.exe#SlideColours (Windows x64, standalone)" `
            --title "SlideColours $env:GITHUB_REF_NAME" `
            --generate-notes
